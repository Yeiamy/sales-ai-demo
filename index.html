<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalesAI Pro - 零售通路 B2B 銷售系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #080f1e; font-family: 'Noto Sans TC', sans-serif; color: #e2eaff; }
        ::-webkit-scrollbar { width: 0; height: 0; } /* 隱藏行動端捲動條 */
        .tab-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; background: transparent; color: #8da3c8; font-size: 13px; white-space: nowrap; }
        .tab-btn.active { background: linear-gradient(135deg,#2a4a8a,#1a3a7a); color: white; border: 1px solid rgba(99,160,255,0.35); }
        .kpi-card { background: #0d1829; border: 1px solid rgba(99,160,255,0.15); border-radius: 12px; padding: 16px; }
        .progress-list-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid rgba(99,160,255,0.1); }
        .chat-msg { padding: 10px 14px; borderRadius: 12px; maxWidth: 85%; fontSize: 13px; lineHeight: 1.5; border: 1px solid rgba(99,160,255,0.15); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 更新為零售通路資料集 ---
        const RETAIL_CHANNELS = [
            { id: "R001", name: "家樂福", type: "量販零售", amount: "NT$ 96 萬", contact: "陳採購經理", desc: "全台 68 門市導入方案", stage: "成交" },
            { id: "R002", name: "Costco 好市多", type: "倉儲量販", amount: "NT$ 120 萬", contact: "林營運協理", desc: "主力通路，2月貢獻366台 (佔當月 72.9%)", stage: "成交" },
            { id: "R003", name: "全國電子", type: "消費電子零售", amount: "NT$ 48 萬", contact: "王業務主任", desc: "評估全台據點擴充", stage: "洽談中" },
            { id: "R004", name: "燦坤3C", type: "消費電子零售", amount: "NT$ 36 萬", contact: "張採購", desc: "競標進行中", stage: "提案中" },
            { id: "R005", name: "順發3C", type: "消費電子零售", amount: "NT$ 24 萬", contact: "李副理", desc: "初次提案討論", stage: "評估中" },
            { id: "R006", name: "車麗屋", type: "汽車百貨零售", amount: "NT$ 12 萬", contact: "林主任", desc: "初步接觸，尚未報價", stage: "初接觸" },
            { id: "R007", name: "民視電視購物", type: "電視購物", amount: "NT$ 60 萬", contact: "王經理", desc: "特定時段促銷合作方案", stage: "洽談中" },
            { id: "R008", name: "名展影音(新竹)", type: "影音零售", amount: "NT$ 32 萬", contact: "陳老闆", desc: "實體店面體驗合作", stage: "提案中" },
        ];

        const CHART_DATA_MOBILE = [
            { month: "9月", val: 50, h: 10 }, { month: "10月", val: 50, h: 10 }, { month: "11月", val: 50, h: 10 },
            { month: "12月", val: 50, h: 10 }, { month: "1月",  val: 79, h: 25 }, { month: "2月",  val: 502, h: 100 },
        ];

        // --- 樣式助手 ---
        const stageColorRetail = (s) => ({
            "成交": { bg: "rgba(45,212,168,0.15)", color: "#2dd4a8", border: "rgba(45,212,168,0.3)" },
            "提案中": { bg: "rgba(79,142,247,0.15)", color: "#7eb3ff", border: "rgba(79,142,247,0.3)" },
            "洽談中": { bg: "rgba(167,139,250,0.15)", color: "#a78bfa", border: "rgba(167,139,250,0.3)" },
            "評估中": { bg: "rgba(245,166,35,0.15)", color: "#f5a623", border: "rgba(245,166,35,0.3)" },
            "初接觸": { bg: "rgba(120,120,120,0.15)", color: "#aaaaaa", border: "rgba(120,120,120,0.3)" },
        }[s] || { bg: "#222", color: "#aaa", border: "#444" });

        // --- 子組件 ---
        function Badge({ label }) {
            const s = stageColorRetail(label);
            return (
                <span style={{
                    padding: "3px 9px", borderRadius: 6, fontSize: 11, fontWeight: 500,
                    background: s.bg, color: s.color, border: `1px solid ${s.border}`, whiteSpace: "nowrap",
                }}>{label}</span>
            );
        }

        // --- 儀表板頁面 ---
        function DashboardRetail() {
            const kpis = [
                { label: "✅ 累計銷售台數", val: "581台", color: "#7eb3ff" },
                { label: "🏪 合作通路數", val: "8家",   color: "#a78bfa" },
                { label: "✅ 已成交通路",   val: "2家",    color: "#2dd4a8" },
                { label: "📈 COSTCO估比",     val: "72.9%",   color: "#f5a623" },
            ];
            return (
                <div>
                    {/* KPI 卡片 */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                        {kpis.map(k => (
                            <div key={k.label} className="kpi-card">
                                <div style={{ fontSize: '11px', color: '#4a6080', marginBottom: '6px' }}>{k.label}</div>
                                <div style={{ fontSize: '26px', fontWeight: '700', color: k.color }}>{k.val}</div>
                            </div>
                        ))}
                    </div>

                    {/* 本月明星通路 (Costco) */}
                    <div style={{ background: 'linear-gradient(135deg,#0d1829,#1a7a5a)', border: '1px solid rgba(45,212,168,0.3)', borderRadius: '12px', padding: '16px', marginBottom: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div>
                            <div style={{ fontSize: '12px', color: '#2dd4a8', display: 'flex', alignItems: 'center', gap: '4px' }}>🏆 本月明星通路</div>
                            <div style={{ fontSize: '18px', fontWeight: '700', marginTop: '6px' }}>Costco 好市多</div>
                            <div style={{ fontSize: '12px', color: '#8da3c8', marginTop: '6px', lineHeight: '1.5' }}>2月貢獻 <strong style={{color:'#2dd4a8'}}>366 台</strong>，佔當月總出貨<br/>502 台的 72.9%</div>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                            <div style={{ fontSize: '32px', fontWeight: '700', color: '#2dd4a8' }}>502</div>
                            <div style={{ fontSize: '12px', color: '#8da3c8' }}>台 / 2026年2月</div>
                        </div>
                    </div>

                    {/* 通路銷售進度 */}
                    <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 12 }}>
                        {/* 左側：銷售台數圖表 */}
                        <div className="kpi-card">
                            <div style={{ fontSize: '13px', fontWeight: '500', marginBottom: '14px', display: 'flex', alignItems: 'center', gap: '6px' }}>📦 月度銷售台數</div>
                            <div style={{ display: "flex", alignItems: "flex-end", gap: '6px', height: '100px', marginBottom: '10px' }}>
                                {CHART_DATA_MOBILE.map((d, i) => (
                                    <div key={d.month} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, gap: '2px' }}>
                                        <div style={{ fontSize: '9px', color: (i===5?'#2dd4a8':'#4a6080') }}>{d.val===50?'--':d.val+'台'}</div>
                                        <div style={{
                                            width: "100%", height: `${d.h}%`,
                                            background: (i===5 ? "linear-gradient(180deg,#2dd4a8,#1a7a5a)" : i===4 ? "linear-gradient(180deg,#4f8ef7,#2a4a9a)" : "rgba(74,96,128,0.15)"),
                                            borderRadius: "3px 3px 0 0",
                                        }} />
                                        <div style={{ fontSize: '9px', color: '#4a6080' }}>{d.month}</div>
                                    </div>
                                ))}
                            </div>
                            <div style={{ fontSize: '10px', color: '#4a6080', textAlign: 'center' }}>* 綠色為 Costco 主力月份</div>
                        </div>
                        
                        {/* 右側：通路進度列表 */}
                        <div className="kpi-card">
                            <div style={{ fontSize: '13px', fontWeight: '500', marginBottom: '14px', display: 'flex', alignItems: 'center', gap: '6px' }}>🏪 通路銷售進度</div>
                            {RETAIL_CHANNELS.slice(0, 8).map((c) => (
                                <div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid rgba(99,160,255,0.05)' }}>
                                    <div>
                                        <div style={{ fontSize: '12px', fontWeight: '500' }}>{c.name}</div>
                                        <div style={{ fontSize: '10px', color: '#4a6080' }}>{c.type}</div>
                                    </div>
                                    <Badge label={c.stage} />
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- AI 助理頁面 (模擬更新後的內容) ---
        function AIChatRetail() {
            const [msgs, setMsgs] = useState([
                { role: "assistant", text: "您好！我是您的 AI 銷售助理 🤖\n\n目前管理 8 個台灣零售通路，包含家樂福、Costco、全國電子、燦坤、順發、車麗屋、民視購物、名展新竹。\n\n📦 1月出貨 79 台，2月共 502 台（Costco 貢獻 366 台，其他通路 136 台）\n\n請問有什麼我可以幫您分析的？" }
            ]);
            const [input, setInput] = useState("");

            return (
                <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 180px)" }}>
                    <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12 }}>
                        {msgs.map((m, i) => (
                            <div key={i} style={{ 
                                alignSelf: m.role === "user" ? "flex-end" : "flex-start",
                                background: m.role === "user" ? "linear-gradient(135deg,#2a4a8a,#1a3a
