  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,160,255,0.2); border-radius: 4px; }

<body>

      { name: "AI 客服機器人平台",   price: "NT$ 10萬", tag: "AI服務", desc: "24/7 自動回覆，支援多語言與多渠道整合" },
      { name: "數據分析儀表板",      price: "NT$ 6萬",  tag: "BI工具", desc: "即時商業智慧，支援自定義報表與預警通知" },
      { name: "供應鏈可視化平台",    price: "NT$ 32萬", tag: "整合服務", desc: "全鏈路追蹤，整合上下游夥伴數據即時共享" },
      { name: "智慧銷售預測模組",    price: "NT$ 15萬", tag: "AI服務", desc: "AI 驅動需求預測，準確率 >85%，降低庫存成本" },
    ];

    const CUSTOMERS = [
      { id: "C001", name: "台積電供應鏈部", industry: "半導體", contact: "陳經理", amount: "120萬", stage: "成交" },
      { id: "C002", name: "統一超商數位部", industry: "零售",   contact: "林副理", amount: "48萬",  stage: "提案中" },

      { id: "C004", name: "富邦金控科技部", industry: "金融",   contact: "張協理", amount: "95萬",  stage: "初接觸" },

    const CHART_DATA = [

      { month: "1月",  val: 1050, h: 85 },

    ];

    const SYSTEM_PROMPT = `你是一個B2B銷售系統的AI助理，協助業務人員分析客戶、推薦產品、回答銷售問題。
現有客戶：台積電(半導體,成交120萬)、統一超商(零售,提案中48萬)、長榮海運(物流,評估中72萬)、富邦金控(金融,初接觸95萬)、鴻海精密(製造業,提案中200萬)。
產品：ERP系統(48萬)、智慧倉儲(18萬)、AI客服(10萬)、BI儀表板(6萬)、供應鏈平台(32萬)、銷售預測(15萬)。
近6月營收5700萬，成交率27%，成交67件。請用繁體中文、簡潔專業的方式回覆。`;

    const stageColor = (s) => ({
      "成交":  { bg: "rgba(45,212,168,0.15)", color: "#2dd4a8", border: "rgba(45,212,168,0.3)" },
      "提案中": { bg: "rgba(79,142,247,0.15)", color: "#7eb3ff", border: "rgba(79,142,247,0.3)" },
      "評估中": { bg: "rgba(245,166,35,0.15)", color: "#f5a623", border: "rgba(245,166,35,0.3)" },
      "初接觸": { bg: "rgba(167,139,250,0.15)", color: "#a78bfa", border: "rgba(167,139,250,0.3)" },
    }[s] || { bg: "#222", color: "#aaa", border: "#444" });

    const tagColor = (t) => ({
      "軟體":   { bg: "rgba(79,142,247,0.15)", color: "#7eb3ff", border: "rgba(79,142,247,0.3)" },
      "AI服務": { bg: "rgba(45,212,168,0.15)", color: "#2dd4a8", border: "rgba(45,212,168,0.3)" },
      "BI工具": { bg: "rgba(245,166,35,0.15)", color: "#f5a623", border: "rgba(245,166,35,0.3)" },
      "整合服務": { bg: "rgba(167,139,250,0.15)", color: "#a78bfa", border: "rgba(167,139,250,0.3)" },
    }[t] || { bg: "#222", color: "#aaa", border: "#444" });

    // 非串流版（給客戶推薦用，需要完整 JSON）
    async function callClaude(messages, system) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system, messages }),
      });
      const data = await res.json();
      return data.content[0].text;
    }

    // 串流版（給 AI 助理聊天用）
    async function callClaudeStream(messages, system, onChunk) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, stream: true, system, messages }),
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullText = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value, { stream: true }).split("\n");
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const json = line.slice(6).trim();
          if (!json || json === "[DONE]") continue;
          try {
            const evt = JSON.parse(json);
            if (evt.type === "content_block_delta" && evt.delta?.type === "text_delta") {
              fullText += evt.delta.text;
              onChunk(fullText);
            }
          } catch {}
        }
      }
      return fullText;
    }

    function Badge({ label }) {
      const s = stageColor(label);
      return (
        <span style={{ padding: "3px 9px", borderRadius: 6, fontSize: 11, fontWeight: 500,
          background: s.bg, color: s.color, border: `1px solid ${s.border}`, whiteSpace: "nowrap" }}>
          {label}
        </span>
      );
    }

    function Dashboard() {
      const kpis = [
        { label: "💰 近6月營收", val: "5700萬", color: "#7eb3ff" },
        { label: "🎯 潛在客戶數", val: "244",    color: "#a78bfa" },
        { label: "✅ 成交案件",   val: "67",     color: "#2dd4a8" },
        { label: "📈 成交率",     val: "27%",    color: "#f5a623" },
      ];
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
            {kpis.map(k => (
              <div key={k.label} style={{ background: "#0d1829", border: "1px solid rgba(99,160,255,0.15)", borderRadius: 12, padding: 16 }}>
                <div style={{ fontSize: 11, color: "#4a6080", marginBottom: 6 }}>{k.label}</div>
                <div style={{ fontFamily: "monospace", fontSize: 26, fontWeight: 700, color: k.color }}>{k.val}</div>
              </div>
            ))}
          </div>

          <div style={{ background: "#0d1829", border: "1px solid rgba(99,160,255,0.15)", borderRadius: 12, padding: 16, marginBottom: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 14 }}>📊 月度營收趨勢</div>
            <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 110 }}>
              {CHART_DATA.map((d, i) => {
                const isLast = i === CHART_DATA.length - 1;
                return (
                  <div key={d.month} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, gap: 4 }}>
                    <div style={{ fontSize: 9, color: isLast ? "#2dd4a8" : "#4a6080", textAlign: "center" }}>{d.val}萬</div>
                    <div style={{ width: "100%", height: `${d.h}%`,
                      background: isLast ? "linear-gradient(180deg,#2dd4a8,#1a7a5a)" : "linear-gradient(180deg,#4f8ef7,#2a4a9a)",
                      borderRadius: "3px 3px 0 0" }} />
                    <div style={{ fontSize: 10, color: "#4a6080" }}>{d.month}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ background: "#0d1829", border: "1px solid rgba(99,160,255,0.15)", borderRadius: 12, padding: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 12 }}>🔥 本月重點客戶</div>
            {CUSTOMERS.slice(0, 3).map((c, i) => (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0",
                borderBottom: i < 2 ? "1px solid rgba(99,160,255,0.1)" : "none" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13 }}>{c.name}</div>
                  <div style={{ fontSize: 11, color: "#4a6080", marginTop: 2 }}>{c.industry} · {c.contact}</div>

    function Customers() {
      const [modal, setModal] = useState(null);
      const [recs, setRecs] = useState(null);

      async function openRec(c) {
        setModal(c); setRecs(null);
        try {
          const text = await callClaude([{
            role: "user",
            content: `根據客戶資料推薦2-3個產品。客戶：${c.name}，行業：${c.industry}，銷售階段：${c.stage}。
產品清單：${JSON.stringify(PRODUCTS.map(p => ({ name: p.name, price: p.price })))}
只回傳JSON，格式：{"recommendations":[{"product":"名稱","price":"價格","reason":"25字內理由"}]}`
          }], "你是B2B銷售AI，用繁體中文回答。只輸出JSON不要其他文字。");
          const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
          setRecs(parsed.recommendations);
        } catch {
          setRecs([
            { product: "企業雲端 ERP 系統", price: "NT$ 48萬", reason: `適合${c.industry}產業核心管理需求` },
            { product: "數據分析儀表板",    price: "NT$ 6萬",  reason: "快速掌握業務狀況，輔助決策" },
          ]);
        }
      }

      return (
        <div>
          <div style={{ fontSize: 15, fontWeight: 500, marginBottom: 12 }}>
            👥 客戶管理 <span style={{ fontSize: 11, color: "#4a6080", fontWeight: 400 }}>— 點擊 AI 推薦取得產品建議</span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {CUSTOMERS.map(c => (
              <div key={c.id} style={{ background: "#0d1829", border: "1px solid rgba(99,160,255,0.15)", borderRadius: 10, padding: 14,
                display: "flex", alignItems: "flex-start", gap: 12 }}>
                <div style={{ fontFamily: "monospace", fontSize: 11, color: "#4f8ef7", minWidth: 36, paddingTop: 2 }}>{c.id}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>{c.name}</div>
                  <div style={{ fontSize: 11, color: "#4a6080" }}>{c.industry} · {c.contact}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                  <div style={{ fontFamily: "monospace", fontSize: 13, color: "#2dd4a8", fontWeight: 700 }}>{c.amount}</div>
                  <Badge label={c.stage} />
                  <button onClick={() => openRec(c)} style={{
                    background: "linear-gradient(135deg,#1a2a4a,#2a3a6a)", border: "1px solid rgba(99,160,255,0.4)",
                    borderRadius: 8, padding: "5px 10px", fontSize: 11, color: "#7eb3ff", cursor: "pointer", fontFamily: "inherit" }}>
                    ✦ AI 推薦
                  </button>
                </div>
              </div>
            ))}
          </div>

          {modal && (
            <div onClick={() => setModal(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 200,
              display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: "#0d1829", border: "1px solid rgba(99,160,255,0.2)",
                borderRadius: 16, padding: 20, width: "100%", maxWidth: 360 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <span style={{ fontSize: 15, fontWeight: 500 }}>✦ AI 產品推薦</span>
                  <button onClick={() => setModal(null)} style={{ background: "none", border: "none", color: "#4a6080", fontSize: 20, cursor: "pointer" }}>×</button>
                </div>
                <div style={{ fontSize: 12, color: "#4a6080", marginBottom: 12 }}>
                  為 <strong style={{ color: "#e2eaff" }}>{modal.name}</strong> 推薦
                </div>
                {!recs ? (
                  <div style={{ color: "#4a6080", fontSize: 13, fontStyle: "italic" }}>AI 分析中...</div>
                ) : recs.map((r, i) => (
                  <div key={i} style={{ background: "#111f35", border: "1px solid rgba(99,160,255,0.15)", borderRadius: 10, padding: 12, marginBottom: 10 }}>

                  </div>

    function Products() {

              const tc = tagColor(p.tag);

                <div key={p.name} style={{ background: "#0d1829", border: "1px solid rgba(99,160,255,0.15)", borderRadius: 12, padding: 16 }}>

                </div>
              );
            })}

    function AIChat() {
      const [msgs, setMsgs] = useState([
        { role: "assistant", text: "您好！我是您的 AI 銷售助理 🤖\n\n我可以幫您：\n· 回答客戶詢問\n· 分析銷售數據\n· 推薦合適產品\n· 生成銷售報告\n\n請問有什麼我可以協助的？" }
      ]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [history, setHistory] = useState([]);
      const bottomRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

      async function send() {
        if (!input.trim() || loading) return;
        const userMsg = input.trim();
        setInput(""); setLoading(true);
        const newHistory = [...history, { role: "user", content: userMsg }];
        setMsgs(prev => [...prev, { role: "user", text: userMsg }, { role: "assistant", text: "" }]);
        try {
          const reply = await callClaudeStream(newHistory, SYSTEM_PROMPT, (partial) => {
            setMsgs(prev => {
              const updated = [...prev];
              updated[updated.length - 1] = { role: "assistant", text: partial };
              return updated;
            });
          });
          setHistory([...newHistory, { role: "assistant", content: reply }]);
        } catch {
          setMsgs(prev => {
            const updated = [...prev];
            updated[updated.length - 1] = { role: "assistant", text: "抱歉，發生錯誤，請再試一次。" };
            return updated;
          });
        }
        setLoading(false);
      }

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 130px)" }}>
          <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12, paddingBottom: 8 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ maxWidth: "85%", alignSelf: m.role === "user" ? "flex-end" : "flex-start" }}>
                <div style={{ fontSize: 10, color: "#4a6080", marginBottom: 4, textAlign: m.role === "user" ? "right" : "left" }}>
                  {m.role === "user" ? "您" : "🤖 AI 銷售助理"}
                </div>
                <div style={{
                  padding: "12px 14px",
                  borderRadius: m.role === "user" ? "12px 4px 12px 12px" : "4px 12px 12px 12px",
                  background: m.role === "user" ? "linear-gradient(135deg,#2a4a8a,#1a3a7a)" : "#111f35",
                  border: m.role === "user" ? "1px solid rgba(99,160,255,0.3)" : "1px solid rgba(99,160,255,0.15)",
                  color: m.role === "user" ? "#7eb3ff" : "#e2eaff",
                  fontSize: 13, lineHeight: 1.6, whiteSpace: "pre-wrap", minHeight: 20,
                }}>
                  {m.text || (loading && i === msgs.length - 1 && m.role === "assistant"
                    ? <span style={{ display: "inline-block", width: 8, height: 14, background: "#4f8ef7", borderRadius: 2, animation: "blink 0.8s infinite", verticalAlign: "middle" }} />
                    : ""
                  )}
                  {loading && i === msgs.length - 1 && m.role === "assistant" && m.text && (
                    <span style={{ display: "inline-block", width: 8, height: 14, background: "#4f8ef7", borderRadius: 2, animation: "blink 0.8s infinite", verticalAlign: "middle", marginLeft: 2 }} />
                  )}
                </div>
              </div>
            ))}
            <div ref={bottomRef} />
          </div>
          <div style={{ display: "flex", gap: 8, paddingTop: 12, borderTop: "1px solid rgba(99,160,255,0.1)" }}>
            <input
              value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && send()}
              placeholder="輸入您的問題..."
              style={{ flex: 1, background: "#111f35", border: "1px solid rgba(99,160,255,0.2)", borderRadius: 10,
                padding: "10px 14px", color: "#e2eaff", fontSize: 13, outline: "none", fontFamily: "inherit" }}
            />
            <button onClick={send} disabled={loading || !input.trim()} style={{
              background: "linear-gradient(135deg,#4f8ef7,#3a6ad4)", border: "none", borderRadius: 10,
              padding: "10px 16px", color: "white", fontSize: 13, cursor: "pointer", fontWeight: 500,
              opacity: loading ? 0.5 : 1, fontFamily: "inherit" }}>
              發送
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("dashboard");
      const tabs = [
        { id: "dashboard", label: "📊 儀表板" },
        { id: "customers", label: "👥 客戶管理" },
        { id: "products",  label: "📦 產品目錄" },
        { id: "ai",        label: "🤖 AI 助理" },
      ];

      return (
        <div style={{ fontFamily: "'Noto Sans TC', sans-serif", background: "#080f1e", color: "#e2eaff", minHeight: "100vh", fontSize: 14 }}>
          {/* Header */}
          <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 16px", background: "#0d1829",
            borderBottom: "1px solid rgba(99,160,255,0.15)", position: "sticky", top: 0, zIndex: 100 }}>
            <div style={{ fontFamily: "monospace", fontSize: 17, fontWeight: 700, color: "#7eb3ff" }}>
              ⚡ SalesAI <span style={{ color: "#2dd4a8" }}>Pro</span>
            </div>
            <div style={{ fontSize: 11, color: "#4a6080", flex: 1 }}>B2B 智慧銷售通路系統</div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "#2dd4a8" }}>
              <div style={{ width: 7, height: 7, background: "#2dd4a8", borderRadius: "50%", animation: "pulse 2s infinite" }} />
              AI 已連線
            </div>
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", gap: 4, padding: "8px 12px", background: "#0d1829",
            borderBottom: "1px solid rgba(99,160,255,0.1)", overflowX: "auto" }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                padding: "7px 14px", borderRadius: 8, cursor: "pointer", fontSize: 13, whiteSpace: "nowrap",
                border: tab === t.id ? "1px solid rgba(99,160,255,0.35)" : "1px solid transparent",
                background: tab === t.id ? "linear-gradient(135deg,#2a4a8a,#1a3a7a)" : "transparent",
                color: tab === t.id ? "#7eb3ff" : "#8da3c8", fontFamily: "inherit", transition: "all 0.2s",
              }}>{t.label}</button>
            ))}
          </div>

          {/* Content */}
          <div style={{ padding: 16 }}>
            {tab === "dashboard" && <Dashboard />}
            {tab === "customers" && <Customers />}
            {tab === "products"  && <Products />}
            {tab === "ai"        && <AIChat />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
